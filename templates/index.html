<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dangerous Writing App</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 20%, #1e1e1e, #0a0a0a 70%);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #eee;
    }

    .card {
      max-width: 480px;
      width: 90%;
      text-align: center;
      padding: 50px 40px;
      border: 2px dashed #d9534f;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.02);
      box-shadow: 0 0 40px rgba(217, 83, 79, 0.15);
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 2px;
      margin-bottom: 10px;
      color: #ff6b6b;
      text-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
    }

    p.tagline {
      color: #aaa;
      font-size: 0.95rem;
      margin-bottom: 35px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    label {
      font-size: 0.85rem;
      color: #ccc;
      letter-spacing: 0.5px;
    }

    input[type="number"] {
      width: 90px;
      padding: 10px;
      text-align: center;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: #222;
      color: #fff;
      outline: none;
      border: 1px solid #444;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #ff6b6b;
    }

    button {
      background: #d9534f;
      color: #fff;
      border: none;
      padding: 14px 40px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover {
      background: #ff6b6b;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>DANGEROUS WRITING APP</h1>
    <p class="tagline">
      Don't stop typing or all progress will be lost!
    </p>

    <form action="{{ url_for('writing_page') }}" method="get">
      <div class="field">
        <label for="seconds">Idle limit (seconds)</label>
        <input type="number" id="seconds" name="seconds" value="5" min="1">
      </div>
      <button type="submit">Start Writing</button>
    </form>
  </div>

</body>
</html>
