<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 20%, #1e1e1e, #0a0a0a 70%);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #eee;
    }

    .container {
      max-width: 700px;
      width: 90%;
      padding: 40px;
    }

    h2 {
      text-align: center;
      color: #ff6b6b;
      letter-spacing: 1px;
      margin-bottom: 25px;
      text-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
    }

    textarea {
      width: 100%;
      height: 350px;
      font-size: 1.05rem;
      line-height: 1.6;
      padding: 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid #333;
      border-radius: 16px;
      color: #eee;
      outline: none;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      border-color: #d9534f;
      box-shadow: 0 0 20px rgba(217, 83, 79, 0.15);
    }

    textarea::placeholder {
      color: #666;
    }

    #status {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #888;
      height: 20px;
      text-align: center;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }

    #status.idle {
      color: #ff6b6b;
      font-weight: 600;
      text-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Start Writing</h2>
    <textarea id="editor" placeholder="Type here... don't stop."></textarea>
    <div id="status">Writing...</div>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const statusEl = document.getElementById('status');

    const IDLE_THRESHOLD = {{idle_seconds }} * 1000;

    let lastKeyTime = Date.now();
    let isIdle = false;

    editor.addEventListener('keydown', () => {
      lastKeyTime = Date.now();
      if (isIdle) {
        isIdle = false;
        statusEl.textContent = 'Writing...';
        statusEl.classList.remove('idle');
      }
    });

    setInterval(() => {
      const idleTime = Date.now() - lastKeyTime;
      if (idleTime >= IDLE_THRESHOLD && !isIdle) {
        isIdle = true;
        statusEl.textContent = `No typing detected for ${IDLE_THRESHOLD / 1000}s`;
        statusEl.classList.add('idle');

        fetch('/idle', { method: 'POST' })
          .then(res => res.json())
          .then(data => {
            if (data.status === 'wiped') {
              editor.value = '';
              statusEl.textContent = 'Progress wiped! You stopped typing too long.';
            }
          });
      }
    }, 500);
  </script>

</body>
</html>
